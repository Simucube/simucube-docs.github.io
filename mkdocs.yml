use_directory_urls: false # setting this false makes static html work without --no-directory-url build flag

extra_css:
  - css/extra.css
  
theme:
  name: material
  logo: assets/sclogo.png
  favicon: assets/sclogo_white.png
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: orange
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.footer

copyright: Copyright &copy; Granite Devices Inc

repo_url: https://github.com/Simucube/simucube-docs.github.io
repo_name: Contribute an edit

extra:
  generator: false
  social:
    - icon: fontawesome/brands/facebook 
      link: https://facebook.com/simucube
    - icon: fontawesome/brands/discord 
      link: https://discord.gg/simucube
    - icon: fontawesome/brands/linkedin 
      link: https://www.linkedin.com/company/granite-devices
    - icon: fontawesome/brands/tiktok
      link: https://www.tiktok.com/@simucube_official
    - icon: fontawesome/brands/twitter 
      link: https://twitter.com/simucube
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/simucube
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/simucube
    - icon: fontawesome/brands/github
      link: https://github.com/simucube      

site_name: Simucube Online Guide

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - abbr
  - pymdownx.snippets:
      auto_append:
        - assets/abbreviations.md
  - pymdownx.keys
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
      
nav:
    - Home: index.md
    - ActivePedal: 
        - Getting started: ActivePedal/Getting started.md
        - Hazards & safety: ActivePedal/Safety.md
        - Installation:
          - Items needed: ActivePedal/Items needed.md
          - Mechanical adjustments: ActivePedal/Mechanical adjustments.md
          - Mounting: ActivePedal/Mounting.md
          - Cabling: ActivePedal/Cabling.md
          - Software: ActivePedal/Software.md
        - Usage: 
          - First time use: ActivePedal/First use.md
          - Profile templates: ActivePedal/Templates.md
          - Travel range: ActivePedal/Travel range.md
          - Force curve: ActivePedal/Force curve.md
          - Effects: ActivePedal/Effects.md
        - FAQ: ActivePedal/FAQ.md
        - Troubleshooting: ActivePedal/Troubleshooting.md
        - Specifications:
          - Specifications: ActivePedal/Specifications.md
          - Game telemetry support: ActivePedal/Telemetry.md
    - TrueDrive:
        - Getting TrueDrive: TrueDrive/Getting started.md
        - App overview: TrueDrive/Overview.md
        - Profile manager: TrueDrive/Profile manager.md
        - Device settings: 
          - ActivePedal: TrueDrive/ActivePedal device settings.md
          - Passive pedal: TrueDrive/Passive pedal device settings.md
        - Troubleshooting: TrueDrive/Troubleshooting.md
    - Developers:
      - ActivePedal:
        - Dimensions & 3D models: Developers/ActivePedal/3D models.md
        - Electrical pinouts: Developers/ActivePedal/Pinouts.md
        - API: Developers/ActivePedal/API.md
